<!doctype html><html lang="en"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Social Travel Intelligence OS</title><style>:root{--bg:#0b101b;--panel:#111827cc;--panel2:#162033b8;--line:#ffffff1c;--text:#f4f7fb;--muted:#a8b3c7;--soft:#dbeafe;--a:#bae6fd;--g:#bbf7d0;--p:#ddd6fe;--w:#fde68a;--r:#fecaca}*{box-sizing:border-box}html{scroll-behavior:smooth}body{margin:0;min-height:100vh;background:radial-gradient(circle at 12% 0%,rgba(186,230,253,.13),transparent 35rem),radial-gradient(circle at 88% 6%,rgba(221,214,254,.12),transparent 35rem),linear-gradient(180deg,#09101b 0%,#0d1423 52%,#090e18 100%);color:var(--text);font-family:Inter,ui-sans-serif,system-ui,-apple-system,Segoe UI,sans-serif;-webkit-font-smoothing:antialiased}button,input,select,textarea{font:inherit;color:inherit}.wrap{width:min(1220px,calc(100% - 28px));margin:auto}.top{position:sticky;top:0;z-index:20;border-bottom:1px solid var(--line);background:#07101bcc;backdrop-filter:blur(18px)}nav{display:flex;align-items:center;justify-content:space-between;gap:14px;padding:14px 0}.brand{font-weight:950;letter-spacing:-.04em}.tabs{display:flex;gap:8px;overflow:auto;max-width:76vw}.tab{border:1px solid var(--line);background:#ffffff0a;color:#cbd5e1;border-radius:999px;padding:9px 12px;font-size:12px;font-weight:800;white-space:nowrap;cursor:pointer}.tab.active{background:linear-gradient(135deg,var(--g),var(--a),var(--p));color:#0f172a;border:0}.view{display:none}.view.active{display:block}.hero{display:grid;grid-template-columns:1.08fr .92fr;gap:24px;padding:64px 0 36px;align-items:center}.eyebrow,.chip{display:inline-flex;align-items:center;border:1px solid #ffffff1a;background:#ffffff0c;border-radius:999px;padding:6px 10px;color:#dbeafe;font-size:12px;font-weight:850}.chip.good{background:#bbf7d01f;color:#dcfce7;border-color:#bbf7d040}.chip.warn{background:#fde68a20;color:#fef3c7;border-color:#fde68a40}.chip.dim{color:#cbd5e1;background:#ffffff08}.hero h1{font-size:clamp(42px,7vw,78px);line-height:.96;letter-spacing:-.07em;margin:16px 0 18px}.lead{font-size:clamp(17px,2vw,21px);line-height:1.65;color:#cbd5e1;max-width:720px}.card{border:1px solid var(--line);background:linear-gradient(180deg,#ffffff13,#ffffff08);border-radius:30px;padding:24px;box-shadow:0 24px 80px #00000045}.soft{border:1px solid var(--line);background:#ffffff0a;border-radius:24px;padding:18px}.btns{display:flex;flex-wrap:wrap;gap:10px;margin-top:22px}.btn{border:0;background:linear-gradient(135deg,var(--g),var(--a),var(--p));color:#0f172a;border-radius:999px;padding:12px 16px;font-weight:950;cursor:pointer;box-shadow:0 18px 55px #7dd3fc22}.ghost{border:1px solid var(--line);background:#ffffff0a;color:#e2e8f0;border-radius:999px;padding:12px 16px;font-weight:850;cursor:pointer}.grid2{display:grid;grid-template-columns:1fr 1fr;gap:16px}.grid3{display:grid;grid-template-columns:repeat(3,1fr);gap:16px}.grid4{display:grid;grid-template-columns:repeat(4,1fr);gap:12px}.section{padding:34px 0}h2{font-size:clamp(30px,4vw,48px);letter-spacing:-.055em;margin:0 0 10px}h3{letter-spacing:-.03em;margin:0 0 8px}p{color:var(--muted);line-height:1.58}.pipe{display:grid;grid-template-columns:repeat(7,1fr);gap:10px;margin-top:16px}.node{background:#ffffff0a;border:1px solid var(--line);border-radius:20px;padding:14px;min-height:112px}.node b{display:block;color:white;margin-bottom:6px}.node span{font-size:13px;color:var(--muted);line-height:1.4}.field{display:grid;gap:6px}.label{font-size:11px;text-transform:uppercase;letter-spacing:.17em;color:#94a3b8;font-weight:950}input,select,textarea{width:100%;border:1px solid var(--line);background:#ffffff0d;border-radius:16px;padding:12px;outline:0}textarea{min-height:150px;resize:vertical;line-height:1.6}.checks{display:grid;grid-template-columns:repeat(3,1fr);gap:8px}.check{border:1px solid var(--line);background:#ffffff08;border-radius:15px;padding:10px;font-size:13px;color:#cbd5e1}.check input{width:auto;margin-right:8px;accent-color:#bae6fd}.chips{display:flex;flex-wrap:wrap;gap:8px}.json{background:#02061780;border:1px solid #ffffff14;border-radius:18px;padding:14px;color:#c7e7ff;font:12px/1.55 ui-monospace,Menlo,Consolas,monospace;overflow:auto;max-height:460px}.bars{display:grid;gap:10px}.bar{border:1px solid #ffffff12;background:#ffffff08;border-radius:20px;padding:12px}.barTop{display:grid;grid-template-columns:220px 1fr 52px;gap:12px;align-items:center}.barName{font-weight:900;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}.track{height:12px;background:#ffffff12;border-radius:99px;overflow:hidden}.fill{height:100%;background:linear-gradient(90deg,var(--g),var(--a),var(--p));border-radius:99px}.score{text-align:right;font-weight:950}.meta{font-size:12px;color:#94a3b8;margin-top:6px}.cards{display:grid;grid-template-columns:repeat(3,1fr);gap:16px}.mini{display:flex;justify-content:space-between;gap:12px;align-items:flex-start}.flow{display:grid;grid-template-columns:repeat(5,1fr);gap:10px}.flow .soft{min-height:120px}@media(max-width:960px){.hero,.grid2,.grid3,.grid4,.cards,.pipe,.flow{grid-template-columns:1fr}.tabs{max-width:100%}nav{align-items:flex-start;flex-direction:column}.checks{grid-template-columns:1fr 1fr}.barTop{grid-template-columns:120px 1fr 42px}}@media(max-width:560px){.wrap{width:min(100% - 20px,1220px)}.checks{grid-template-columns:1fr}.hero h1{font-size:42px}.card{padding:18px;border-radius:24px}.barTop{grid-template-columns:1fr}.score{text-align:left}.tabs{width:100%}}</style></head><body><header class="top"><div class="wrap"><nav><div class="brand">Social Travel Intelligence OS</div><div class="tabs" id="tabs"></div></nav></div></header><main class="wrap"><section id="overview" class="view active"></section><section id="intake" class="view"></section><section id="destinations" class="view"></section><section id="places" class="view"></section><section id="business" class="view"></section><section id="costs" class="view"></section><section id="safety" class="view"></section><section id="architecture" class="view"></section></main><script>const $=id=>document.getElementById(id);const pages=[['overview','Overview'],['intake','Traveler Intake'],['destinations','Destinations'],['places','Places'],['business','Business Portal'],['costs','Cost Model'],['safety','Safety'],['architecture','Architecture']];const featureLabels={sea:'Sea',historic:'Historic',seafood:'Seafood',local_food:'Local food',young_adults:'Young adults',international:'International crowd',clubs:'Clubs',bars:'Bars',matcha:'Matcha',baked_goods:'Baked goods',sports_tv:'Sports TV',coworking:'Coworking',laptop:'Laptop-friendly',terrace:'Terrace',live_music:'Live music',beach_sports:'Beach sports',language_exchange:'Language exchange',startup_events:'Startup events'};const features=Object.keys(featureLabels);let state={note:'Historic old city by the sea, fresh seafood, not too crowded, young international people, bars, casual networking, sports TV sometimes, cafés with baked goods and matcha.',group:5,age:'25-30',budget:1000,nights:7,month:'July',style:'balanced',features:{},avoid:{}};const cities=[['Valencia',760,92,88,86,84,88,true,['Ruzafa','El Carmen','Cabanyal'],'Beach city with food, culture, Erasmus, bars, and strong mobility'],['Malta',820,96,92,90,78,78,true,['Sliema','Gzira','St Julian’s'],'English-speaking, high international density, nightlife, history'],['Málaga',790,88,87,88,86,86,true,['Centro','Soho','Malagueta'],'Compact beach-history-nightlife city with seafood'],['Lisbon',850,94,91,92,82,80,false,['Bairro Alto','Cais do Sodré','Alfama'],'Global culture and nightlife city with remote worker density'],['Split',790,83,80,94,78,72,true,['Old Town','Bacvice'],'Cinematic historic sea trip with strong summer seasonality'],['Palermo',710,72,74,94,92,66,true,['Kalsa','Vucciria','Mondello'],'Historic coastal food city, less polished but rich']];const places=[['Cabanal Seafood Terrace','seafood restaurant','Valencia','Cabanyal',3,['sea','seafood','local_food','terrace','young_adults','international'],78,82,true,'Coastal seafood, terrace, group-friendly dinner'],['Ruzafa Matcha & Bakes','café','Valencia','Ruzafa',2,['matcha','baked_goods','young_adults','international','laptop','coworking'],88,76,true,'Specialty drinks, baked goods, international café culture'],['Old Town Sports Social','sports bar','Málaga','Centro',2,['sports_tv','bars','young_adults','international','live_music'],84,70,false,'Sports TV and casual international bar energy'],['Harbour Cowork Terrace','coworking','Malta','Sliema',3,['coworking','laptop','terrace','startup_events','international'],80,78,true,'Coworking plus terrace and opt-in networking'],['Palace Alley Wine Bar','bar','Split','Old Town',3,['historic','bars','young_adults','international'],76,81,false,'Historic ambience with calmer social energy'],['Mondello Fish House','restaurant','Palermo','Mondello',2,['sea','seafood','local_food','terrace'],66,74,true,'Seafood culture and calmer coastal local feel']];function show(id){document.querySelectorAll('.view').forEach(v=>v.classList.remove('active'));$(id).classList.add('active');document.querySelectorAll('.tab').forEach(t=>t.classList.toggle('active',t.dataset.id===id));render()}function parse(){let t=state.note.toLowerCase();features.forEach(f=>state.features[f]=t.includes(f.replace('_',' '))||t.includes(f));if(/sea|beach|coast/.test(t))state.features.sea=true;if(/historic|rome|old|ancient|museum|culture/.test(t))state.features.historic=true;if(/fish|seafood|fresh/.test(t))state.features.seafood=true;if(/bar|drink|pub/.test(t))state.features.bars=true;if(/international|erasmus|expat|traveller|traveler/.test(t))state.features.international=true;if(/young|student|25|30/.test(t))state.features.young_adults=true;if(/not crowded|less crowded|quiet|calm/.test(t))state.avoid.too_crowded=true;if(/authentic|tourist trap|not touristy/.test(t))state.avoid.tourist_traps=true}function active(){return features.filter(f=>state.features[f])}function cityTags(c){let tags=[];if(c[7])tags.push('sea');if(c[4]>82)tags.push('historic');if(c[5]>82)tags.push('local_food','seafood');if(c[2]>82)tags.push('young_adults','international');if(c[3]>80)tags.push('bars');if(c[3]>89)tags.push('clubs');return tags}function fit(tags){let a=active();if(!a.length)return 70;return Math.round(100*a.filter(x=>tags.includes(x)).length/a.length)}function scoreCity(c){let cost=c[1]+Math.max(0,state.nights-7)*55,budget=Math.max(0,Math.min(100,100-Math.max(0,cost-state.budget)/8+(cost<=state.budget?8:0))),ff=fit(cityTags(c)),risk=state.avoid.too_crowded&&['Malta','Split'].includes(c[0])?7:0;let s=.2*budget+.17*c[2]+.14*c[3]+.14*c[4]+.13*c[5]+.1*c[6]+.12*ff-risk;return{score:Math.round(s),cost,feature:ff,risk}}function scorePlace(p){let ff=fit(p[5]),price=Math.max(0,100-(p[4]-1)*16),biz=p[8]?100:55,s=.3*ff+.18*p[6]+.15*price+.15*p[7]+.12*biz+.1*80;return Math.round(Math.min(99,s))}function bars(items,fn,label,meta){return '<div class=bars>'+items.map((x,i)=>{let s=fn(x);return `<div class=bar><div class=barTop><div class=barName>${i+1}. ${label(x)}</div><div class=track><div class=fill style="width:${typeof s==='number'?s:s.score}%"></div></div><div class=score>${typeof s==='number'?s:s.score}</div></div><div class=meta>${meta?meta(x,s):''}</div></div>`}).join('')+'</div>'}function renderOverview(){return `<div class=hero><div><span class=eyebrow>Investor-facing MVP preview</span><h1>Travel planning with social context, not shallow descriptions.</h1><p class=lead>A calm, dynamic product demo that turns messy preference into structured intent, then ranks cities, places, events, and routes by social fit.</p><div class=btns><button class=btn onclick="show('intake')">Try intake</button><button class=ghost onclick="show('destinations')">Destinations</button><button class=ghost onclick="show('places')">Places</button><button class=ghost onclick="show('business')">Business portal</button></div></div><div class=card><h2>Why this exists</h2><p>“Cozy” and “good atmosphere” do not tell you if a place is social, quiet, international, laptop-friendly, group-friendly, or useful for meeting people.</p><div class=pipe>${['Preference input','Structured intent','City match','Place match','Business proof','Opt-in events','Feedback'].map((x,i)=>`<div class=node><b>${i+1}. ${x}</b><span>Clear decision layer, not generic travel content.</span></div>`).join('')}</div></div></div>`}function renderIntake(){let intent={group:{size:state.group,age_range:state.age},budget:{per_person_eur:state.budget},dates:{month:state.month,nights:state.nights},features:active(),avoid:state.avoid,confidence:.84};return `<div class=section><h2>Traveler Preference Intake</h2><p>Natural language becomes structured intent. The user can still edit the fields, so AI never owns the final truth.</p><div class=grid2><div class=card><div class=field><div class=label>Preference</div><textarea id=note>${state.note}</textarea></div><div class=grid4 style="margin-top:12px"><div class=field><div class=label>Group</div><input id=group type=number value=${state.group}></div><div class=field><div class=label>Age</div><input id=age value="${state.age}"></div><div class=field><div class=label>Budget pp</div><input id=budget type=number value=${state.budget}></div><div class=field><div class=label>Nights</div><input id=nights type=number value=${state.nights}></div></div><button class=btn style="margin-top:14px" onclick="saveIntake()">Extract intent</button><h3 style="margin-top:22px">Feature toggles</h3><div class=checks>${features.map(f=>`<label class=check><input type=checkbox ${state.features[f]?'checked':''} onchange="state.features['${f}']=this.checked;render()">${featureLabels[f]}</label>`).join('')}</div></div><div class=card><h3>Structured output</h3><div class=chips>${active().map(f=>`<span class=chip>${featureLabels[f]}</span>`).join('')}<span class="chip good">84% confidence</span></div><pre class=json>${JSON.stringify(intent,null,2)}</pre></div></div></div>`}function saveIntake(){state.note=$('note').value;state.group=+$('group').value;state.age=$('age').value;state.budget=+$('budget').value;state.nights=+$('nights').value;state.features={};state.avoid={};parse();render()}function renderDest(){let arr=[...cities].map(c=>({c,s:scoreCity(c)})).sort((a,b)=>b.s.score-a.s.score);return `<div class=section><h2>Destination Intelligence</h2><p>Scores react to budget, stay length, desired features, social density, nightlife, history, food, mobility, and risk penalties.</p><div class=card>${bars(arr,x=>x.s,x=>x.c[0],x=>`€${x.s.cost} pp · neighborhoods: ${x.c[8].join(', ')} · feature fit ${x.s.feature}`)}</div><div class=cards style="margin-top:16px">${arr.map(x=>`<div class=soft><div class=mini><h3>${x.c[0]}</h3><span class="chip good">${x.s.score}/100</span></div><p>${x.c[9]}</p><div class=chips>${x.c[8].map(n=>`<span class="chip dim">${n}</span>`).join('')}</div></div>`).join('')}</div></div>`}function renderPlaces(){let arr=[...places].map(p=>({p,s:scorePlace(p)})).sort((a,b)=>b.s-a.s);return `<div class=section><h2>Place Intelligence</h2><p>Restaurants, cafés, bars, coworking spots, sport spots and third spaces ranked by social fit and feature match.</p><div class=card>${bars(arr,x=>x.s,x=>x.p[0],x=>`${x.p[1]} · ${x.p[2]} / ${x.p[3]} · ${x.p[8]?'confirmed':'not confirmed'}`)}</div><div class=cards style="margin-top:16px">${arr.map(x=>`<div class=soft><div class=mini><h3>${x.p[0]}</h3><span class="chip good">${x.s}/100</span></div><p>${x.p[9]}</p><div class=chips>${x.p[5].map(f=>`<span class=chip>${featureLabels[f]||f}</span>`).join('')}</div></div>`).join('')}</div></div>`}function renderInfo(title,sub,items){return `<div class=section><h2>${title}</h2><p>${sub}</p><div class=grid3>${items.map(x=>`<div class=soft><p>${x}</p></div>`).join('')}</div></div>`}function renderCost(){return renderInfo('Cost Model','Planning layer for founder/investor estimates.',['Hosting + app server','Database / storage / images','Voice transcription + LLM reasoning','Image analysis','Maps/place API','Rule: analyze once → store structured tags → reuse forever'])}function renderBusiness(){return renderInfo('Business Portal','Not a generic listing form. Businesses confirm social reality.',['Identity, hours, links, languages','Quiet/social/loud and local/tourist/mixed','Good for groups, solo travelers, remote work, sports, pre-drinks','Feature confirmation: matcha, seafood, baked goods, sports TV','Proof photos require ownership or consent','Generated structured JSON profile'])}function renderSafety(){return renderInfo('Trust, Safety, Compliance','The product recommends environments and opt-in events, not individual people.',['No private individual identification','No sensitive trait inference','No attractiveness ranking','Business media requires consent','Faces blurred in production','GitHub Pages is demo hosting, not production SaaS'])}function renderArch(){return `<div class=section><h2>Architecture</h2><p>Production system separation.</p><div class=flow>${['LLM extracts structured intent','Database stores verified place reality','Image model detects venue features','Business UI confirms reality','Scoring engine makes transparent decisions'].map(x=>`<div class=soft><h3>${x}</h3><p>Clear boundary; no hidden freestyle logic.</p></div>`).join('')}</div></div>`}function render(){parse();$('overview').innerHTML=renderOverview();$('intake').innerHTML=renderIntake();$('destinations').innerHTML=renderDest();$('places').innerHTML=renderPlaces();$('business').innerHTML=renderBusiness();$('costs').innerHTML=renderCost();$('safety').innerHTML=renderSafety();$('architecture').innerHTML=renderArch()}$('tabs').innerHTML=pages.map(([id,l])=>`<button class="tab ${id==='overview'?'active':''}" data-id=${id} onclick="show('${id}')">${l}</button>`).join('');render();</script></body></html>
