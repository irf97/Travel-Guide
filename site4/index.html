<!doctype html>
<html lang="en">
<head>

<title>Social Travel Intelligence OS</title>
<style>
:root{--bg:#070b13;--panel:rgba(255,255,255,.075);--panel2:rgba(255,255,255,.115);--text:#f7fbff;--muted:#aab4c7;--line:rgba(255,255,255,.14);--a:#7dd3fc;--b:#c084fc;--g:#86efac;--w:#fde68a;--r:#fca5a5;--shadow:0 28px 80px rgba(0,0,0,.35)}*{box-sizing:border-box}html{scroll-behavior:smooth}body{margin:0;background:radial-gradient(circle at 8% 0,rgba(125,211,252,.22),transparent 34rem),radial-gradient(circle at 92% 0,rgba(192,132,252,.18),transparent 34rem),linear-gradient(#070b13,#0d1224 48%,#070b13);color:var(--text);font-family:Inter,ui-sans-serif,system-ui,-apple-system,Segoe UI,sans-serif}.wrap{width:min(1280px,calc(100% - 28px));margin:auto}header{position:sticky;top:0;z-index:20;background:rgba(7,11,19,.78);backdrop-filter:blur(16px);border-bottom:1px solid var(--line)}nav{display:flex;align-items:center;justify-content:space-between;gap:16px;padding:13px 0}.brand{font-weight:950;letter-spacing:-.04em}.navlinks{display:flex;gap:8px;overflow:auto}.navlinks button{white-space:nowrap}.tab,.btn,.ghost{border:1px solid var(--line);border-radius:999px;padding:9px 12px;background:rgba(255,255,255,.07);color:var(--text);font-weight:850;cursor:pointer}.tab.active,.btn{background:linear-gradient(135deg,var(--a),var(--g));color:#06111d;border:0}.ghost:hover,.tab:hover{border-color:rgba(125,211,252,.55)}main{padding-bottom:44px}.view{display:none}.view.active{display:block}.hero{display:grid;grid-template-columns:1.08fr .92fr;gap:18px;padding:58px 0 24px}.eyebrow,.chip{display:inline-flex;border:1px solid var(--line);background:rgba(125,211,252,.08);color:#dbeafe;border-radius:999px;padding:6px 9px;font-size:12px;font-weight:850}.chip.on{background:linear-gradient(135deg,rgba(125,211,252,.22),rgba(192,132,252,.18));border-color:rgba(125,211,252,.45)}h1{font-size:clamp(42px,7vw,82px);line-height:.92;letter-spacing:-.075em;margin:14px 0 18px}h2{font-size:clamp(28px,4vw,48px);letter-spacing:-.055em;margin:0 0 10px}h3{letter-spacing:-.03em;margin:0 0 8px}.lead,p,.note,li{color:var(--muted);line-height:1.5}.lead{font-size:clamp(17px,2vw,21px)}.card{border:1px solid var(--line);background:linear-gradient(180deg,var(--panel2),rgba(255,255,255,.055));border-radius:24px;padding:20px;box-shadow:var(--shadow)}.flat{box-shadow:none;background:var(--panel)}.grid2{display:grid;grid-template-columns:1fr 1fr;gap:14px}.grid3{display:grid;grid-template-columns:repeat(3,1fr);gap:14px}.grid4{display:grid;grid-template-columns:repeat(4,1fr);gap:14px}.grid5{display:grid;grid-template-columns:repeat(5,1fr);gap:10px}.section{padding:28px 0}.kpi{border:1px solid var(--line);background:var(--panel);border-radius:18px;padding:15px}.kpi b{font-size:26px;letter-spacing:-.04em}.formula,pre{font-family:ui-monospace,SFMono-Regular,Menlo,Consolas,monospace;background:rgba(0,0,0,.26);border:1px solid var(--line);border-radius:15px;padding:13px;color:#e0f2fe;line-height:1.55;white-space:pre-wrap;overflow:auto}input,select,textarea,button{font:inherit}input,select,textarea{width:100%;border:1px solid var(--line);background:rgba(255,255,255,.08);color:var(--text);border-radius:14px;padding:11px;outline:none}textarea{min-height:120px;resize:vertical}select option{background:#111827}.filters{display:grid;grid-template-columns:1.3fr repeat(4,1fr);gap:10px;margin:14px 0}.checks{display:grid;grid-template-columns:repeat(4,1fr);gap:8px}.checks label{border:1px solid var(--line);border-radius:13px;padding:9px;color:var(--muted);font-size:13px;background:rgba(255,255,255,.045)}.checks input{width:auto;margin-right:7px}.chips{display:flex;flex-wrap:wrap;gap:8px;margin:10px 0}.bars{display:grid;gap:9px;margin:14px 0}.bar{display:grid;grid-template-columns:34px 230px 1fr 56px 90px;gap:10px;align-items:center}.pos{width:30px;height:30px;border-radius:10px;display:grid;place-items:center;background:linear-gradient(135deg,var(--a),var(--b));color:#06111d;font-weight:950}.name{font-weight:850;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}.track{height:15px;border-radius:999px;background:rgba(255,255,255,.09);overflow:hidden;border:1px solid rgba(255,255,255,.08)}.fill{height:100%;background:linear-gradient(90deg,var(--g),var(--a),var(--b));border-radius:999px}.score{text-align:right;font-weight:950}.meta{text-align:right;color:var(--muted);font-size:12px}.table{overflow:auto;border:1px solid var(--line);border-radius:22px;background:rgba(255,255,255,.05);margin-top:14px}table{width:100%;min-width:1280px;border-collapse:collapse}th,td{padding:12px;border-bottom:1px solid var(--line);text-align:left;vertical-align:top}th{font-size:12px;text-transform:uppercase;letter-spacing:.08em;color:#dbeafe;background:rgba(255,255,255,.06)}td{font-size:14px;color:var(--muted)}td strong{color:var(--text)}.risk{color:#450a0a;background:var(--r);border:0}.good{color:#052e16;background:var(--g);border:0}.warn{color:#3b2602;background:var(--w);border:0}.imageGrid{display:flex;gap:8px;flex-wrap:wrap}.imageGrid img{width:95px;height:76px;object-fit:cover;border-radius:12px;border:1px solid var(--line)}.temp{outline:1px solid rgba(125,211,252,.6);background:rgba(125,211,252,.07)}.pipeline{display:grid;grid-template-columns:repeat(7,1fr);gap:10px}.node{border:1px solid var(--line);border-radius:18px;background:var(--panel);padding:13px;min-height:105px}.node b{display:block;margin-bottom:6px}.node span{color:var(--muted);font-size:13px;line-height:1.35}.split{display:grid;grid-template-columns:1.2fr .8fr;gap:14px}.hidden{display:none!important}@media(max-width:980px){.hero,.grid2,.grid3,.grid4,.grid5,.filters,.split,.pipeline{grid-template-columns:1fr}.checks{grid-template-columns:1fr 1fr}.bar{grid-template-columns:30px 150px 1fr 46px 70px}.navlinks{max-width:70vw}.card{padding:16px}}@media(max-width:620px){.wrap{width:min(100% - 18px,1280px)}.checks{grid-template-columns:1fr}.bar{grid-template-columns:28px 110px 1fr 40px}.bar .meta{display:none}}
</style>
</head>
<body>
<header><div class="wrap"><nav><div class="brand">Social Travel Intelligence OS</div><div class="navlinks" id="tabs"></div></nav></div></header>
<main class="wrap">
<section class="view active" id="landing"></section>

<section class="view" id="destinations"></section>
<section class="view" id="places"></section>
<section class="view" id="business"></section>

</main>
<script>
const $=id=>document.getElementById(id);const q=(s,r=document)=>[...r.querySelectorAll(s)];
const FEATURES=['sea','historic','seafood','local_food','young_adults','international','clubs','bars','matcha','baked_goods','sports_tv','coworking','laptop_friendly','terrace','live_music','beach_sports','language_exchange','startup_events','low_crowd','food_culture','remote_work','sports'];
const AVOID=['too_crowded','tourist_traps','expensive','family_only','car_dependent','dead_nightlife'];
const PAGES=[['landing','Overview'],['intake','Traveler intake'],['destinations','Destinations'],['places','Places'],['business','Business portal'],['images','Image definer'],['networking','Networking'],['costs','Cost model'],['safety','Trust & safety'],['architecture','Architecture']];
let state={intent:{features:{},avoid:{},groupSize:5,ageRange:'25-30',budget:1000,nights:7,month:'July',style:'balanced',datesMode:'month',from:'',to:'',text:'Historic old city by the sea, good seafood, not too crowded, young international people, bars, casual networking, sports TV sometimes, cafés with baked goods and matcha.'},tempCity:null,tempPlace:null,businessProfile:null,imageTags:null};
const cities=[
{name:'Valencia',type:'city',baseCost:760,social:92,nightlife:88,history:86,food:84,mobility:88,sea:true,season:{May:86,June:89,July:82,August:78,September:92,October:88},hoods:'Ruzafa, El Carmen, Cabanal, Malvarrosa',profile:'Real city, beach, Erasmus/expat energy, food culture, strong no-car viability',risks:['hot in August','less villa-friendly in center']},
{name:'Malta',type:'island',baseCost:820,social:96,nightlife:92,history:90,food:78,mobility:78,sea:true,season:{May:88,June:92,July:90,August:86,September:94,October:84},hoods:'Sliema, Gzira, St Julian’s, Valletta',profile:'English-speaking, high international density, clubs, deep history',risks:['Paceville can be chaotic','summer price pressure']},
{name:'Málaga',type:'city',baseCost:790,social:88,nightlife:87,history:88,food:86,mobility:86,sea:true,season:{May:88,June:88,July:82,August:80,September:90,October:88},hoods:'Centro, Soho, Malagueta, Pedregalejo',profile:'Compact beach-history-nightlife city with seafood and travelers',risks:['tourist center can crowd','August heat']},
{name:'Lisbon',type:'city',baseCost:850,social:94,nightlife:91,history:92,food:82,mobility:80,sea:false,season:{May:90,June:88,July:84,August:82,September:92,October:90},hoods:'Bairro Alto, Cais do Sodré, Alfama, Principe Real',profile:'Global social/cultural city, nightlife, food, remote workers',risks:['not directly beach-first','hills/transport friction']},
{name:'Split',type:'historic-sea',baseCost:790,social:83,nightlife:80,history:94,food:78,mobility:72,sea:true,season:{May:78,June:88,July:92,August:90,September:88,October:70},hoods:'Old Town, Bacvice, Znjan',profile:'Roman palace, sea, island trips, summer social travelers',risks:['seasonal','old town can crowd']},
{name:'Palermo',type:'historic-sea',baseCost:710,social:72,nightlife:74,history:94,food:92,mobility:66,sea:true,season:{May:84,June:86,July:80,August:78,September:88,October:86},hoods:'Kalsa, Vucciria, Politeama, Mondello',profile:'Historic coastal food city, seafood, less polished/touristy',risks:['mobility friction','less predictable nightlife']},
{name:'Alicante',type:'budget-sea',baseCost:690,social:78,nightlife:75,history:70,food:74,mobility:84,sea:true,season:{May:82,June:86,July:88,August:86,September:86,October:78},hoods:'Centro, El Barrio, Postiguet, San Juan',profile:'Budget-friendly beach city, simple flights, enough nightlife',risks:['less cultural depth','some resort feel']},
{name:'Porto',type:'city',baseCost:720,social:82,nightlife:78,history:91,food:84,mobility:82,sea:false,season:{May:88,June:86,July:82,August:80,September:88,October:86},hoods:'Ribeira, Baixa, Cedofeita, Foz',profile:'Affordable culture, food, wine, international visitors',risks:['less club-heavy','not immediate beach trip']}
];
const places=[
{name:'Cabanal Seafood Terrace',type:'seafood restaurant',city:'Valencia',hood:'Cabanal',price:3,tags:['sea','seafood','local_food','terrace','young_adults','international'],amb:['social','coastal','group-friendly'],score:{social:78,evidence:82},biz:true,good:['groups','dates','recovery day'],why:'coastal seafood, terrace, group-friendly social dinner'},
{name:'Ruzafa Matcha & Bakes',type:'café',city:'Valencia',hood:'Ruzafa',price:2,tags:['matcha','baked_goods','young_adults','international','laptop_friendly','coworking'],amb:['warm','creative','daytime social'],score:{social:88,evidence:76},biz:true,good:['remote work','meeting people','solo travelers'],why:'specialty drinks, baked goods, international café culture'},
{name:'Old Town Sports Social',type:'sports bar',city:'Málaga',hood:'Centro',price:2,tags:['sports_tv','bars','young_adults','international','live_music'],amb:['high-energy','casual','pre-drinks'],score:{social:84,evidence:70},biz:false,good:['watching sports','groups','pre-drinks'],why:'sports TV and international social bar energy'},
{name:'Harbour Cowork Terrace',type:'coworking',city:'Malta',hood:'Sliema',price:3,tags:['coworking','laptop_friendly','terrace','networking','international','startup_events'],amb:['productive','networking','sea-view'],score:{social:80,evidence:78},biz:true,good:['remote work','meeting people','solo travelers'],why:'coworking plus terrace and opt-in networking'},
{name:'Palace Alley Wine Bar',type:'bar',city:'Split',hood:'Old Town',price:3,tags:['historic','bars','young_adults','international','low_crowd'],amb:['old-town','social','low-light'],score:{social:76,evidence:81},biz:false,good:['dates','groups','pre-drinks'],why:'historic ambience with calmer social energy'},
{name:'Mondello Fish House',type:'restaurant',city:'Palermo',hood:'Mondello',price:2,tags:['sea','seafood','local_food','terrace','low_crowd'],amb:['local','coastal','slow dinner'],score:{social:66,evidence:74},biz:true,good:['groups','recovery day','dates'],why:'seafood culture and calmer coastal local feel'},
{name:'Beach Volleyball Meetup Zone',type:'sport spot',city:'Málaga',hood:'Malagueta',price:1,tags:['beach_sports','sea','young_adults','international','networking'],amb:['active','open','daytime social'],score:{social:90,evidence:65},biz:false,good:['meeting people','groups','solo travelers'],why:'opt-in sport/social environment near beach'},
{name:'Quiet Roman Courtyard',type:'third space',city:'Split',hood:'Old Town',price:2,tags:['historic','low_crowd','terrace','baked_goods'],amb:['quiet','historic','recovery day'],score:{social:62,evidence:86},biz:true,good:['recovery day','solo travelers','dates'],why:'calm third space inside a historic setting'}
];
const events=[
{name:'Language exchange night',tags:['language_exchange','international','young_adults'],type:'event'},
{name:'Beach volleyball open game',tags:['beach_sports','sea','young_adults','networking'],type:'sport'},
{name:'Startup/digital nomad meetup',tags:['startup_events','coworking','networking','international'],type:'networking'},
{name:'Football viewing night',tags:['sports_tv','bars','young_adults'],type:'event'},
{name:'Open mic / live music evening',tags:['live_music','bars','international'],type:'event'},
{name:'Food tour / seafood market walk',tags:['seafood','local_food','food_culture'],type:'food'},
{name:'Board-game café evening',tags:['young_adults','low_crowd','networking'],type:'event'},
{name:'Pub crawl with travelers',tags:['bars','clubs','international','young_adults'],type:'event'}
];
function show(id){q('.view').forEach(v=>v.classList.remove('active'));$(id).classList.add('active');q('.tab').forEach(b=>b.classList.toggle('active',b.dataset.id===id));renderAll()}
function initTabs(){ $('tabs').innerHTML=PAGES.map(([id,label])=>`<button class="tab ${id==='landing'?'active':''}" data-id="${id}" onclick="show('${id}')">${label}</button>`).join('')}
function chips(arr){return arr.map(x=>`<span class="chip on">${x.replaceAll('_',' ')}</span>`).join('')}
function checkboxGrid(id,items,obj){return `<div class="checks">${items.map(f=>`<label><input type="checkbox" ${obj[f]?'checked':''} onchange="state.intent.${id}['${f}']=this.checked;renderAll()">${f.replaceAll('_',' ')}</label>`).join('')}</div>`}
function parseText(){const t=state.intent.text.toLowerCase();FEATURES.forEach(f=>{if(t.includes(f.replace('_',' '))||t.includes(f))state.intent.features[f]=true});if(/rome|old|ancient|castle|palace|museum|historic/.test(t))state.intent.features.historic=true;if(/sea|beach|coast|harbour|harbor/.test(t))state.intent.features.sea=true;if(/fish|sea food|seafood|fresh food/.test(t))state.intent.features.seafood=true;if(/less crowded|not crowded|quiet|calm/.test(t))state.intent.features.low_crowd=true;if(/meet|network|people|social/.test(t))state.intent.features.international=true;if(/avoid.*crowd|too crowded/.test(t))state.intent.avoid.too_crowded=true;renderAll()}
function activeFeatures(){return Object.keys(state.intent.features).filter(k=>state.intent.features[k])}
function activeAvoid(){return Object.keys(state.intent.avoid).filter(k=>state.intent.avoid[k])}
function featureScore(tags){const a=activeFeatures();if(!a.length)return 45;return Math.round(100*a.filter(f=>tags.includes(f)).length/Math.max(1,a.length))}
function cityScore(c){const f=activeFeatures(),month=state.intent.month;let score=0;let cost=c.baseCost+(state.intent.nights-7)*45;let budgetFit=Math.max(0,100-Math.max(0,cost-state.intent.budget)/8);let season=c.season[month]||80;let food=f.includes('seafood')||f.includes('local_food')||f.includes('food_culture')?c.food:70;let seaFit=f.includes('sea')?(c.sea?100:35):70;let style=state.intent.style;let weights={budget:.18,season:.12,social:.18,nightlife:.14,history:.14,food:.12,mobility:.08,sea:.04};if(style==='social'||style==='nightlife'){weights.social=.26;weights.nightlife=.24;weights.history=.08;weights.budget=.12}if(style==='culture'){weights.history=.28;weights.food=.16;weights.nightlife=.06}if(style==='food'){weights.food=.28;weights.history=.16;weights.social=.14}if(style==='budget'){weights.budget=.34;weights.nightlife=.08}if(style==='remote-work'){weights.mobility=.18;weights.social=.18;weights.budget=.18}score=weights.budget*budgetFit+weights.season*season+weights.social*c.social+weights.nightlife*c.nightlife+weights.history*c.history+weights.food*food+weights.mobility*c.mobility+weights.sea*seaFit;if(state.intent.avoid.car_dependent&&c.mobility<75)score-=8;if(state.intent.avoid.dead_nightlife&&c.nightlife<78)score-=8;if(state.intent.avoid.too_crowded&&c.risks.join(' ').includes('crowd'))score-=5;return {score:Math.round(Math.max(0,Math.min(99,score))),cost:Math.round(cost),budgetFit:Math.round(budgetFit),season,food,seaFit}}
function placeScore(p){let fs=featureScore(p.tags);let priceFit=Math.max(0,100-(p.price-1)*16);let social=p.score.social;let evidence=p.score.evidence;let biz=p.biz?100:55;let loc=cityScore(cities.find(c=>c.name===p.city)||cities[0]).score;let score=.30*fs+.18*social+.15*priceFit+.15*evidence+.12*biz+.10*loc;if(state.intent.style==='food'&&(p.tags.includes('seafood')||p.tags.includes('local_food')))score+=8;if(state.intent.style==='sports'&&p.tags.includes('sports_tv'))score+=10;if(state.intent.style==='remote-work'&&p.tags.includes('laptop_friendly'))score+=10;return Math.round(Math.max(0,Math.min(99,score)))}
function renderLanding(){ $('landing').innerHTML=`<div class="hero"><div><span class="eyebrow">Investor-facing startup prototype</span><h1>Travel planning with social context, not shallow descriptions.</h1><p class="lead">Social Travel Intelligence OS turns messy human desire into structured intent, then ranks destinations, neighborhoods, restaurants, cafés, bars, coworking spaces, sport spots, third spaces, and opt-in social opportunities.</p><div class="chips"><button class="btn" onclick="show('intake')">Try traveler intake</button><button class="ghost" onclick="show('places')">Explore place intelligence</button><button class="ghost" onclick="show('business')">View business portal</button><button class="ghost" onclick="show('costs')">View cost model</button></div></div><div class="card"><h2>Product thesis</h2><p>Online descriptions say “cozy” and “good atmosphere.” Users need to know the actual social reality: who it fits, when it is social, what features exist, how it feels, and whether it matches the trip they imagined.</p><div class="formula">Preference input → structured intent → city matching → place matching → business confirmation → itinerary/social opportunities → feedback calibration</div></div></div><div class="section"><h2>System pipeline</h2><div class="pipeline">${['Preference input','Structured intent','City matching','Place matching','Business confirmation','Social route','Feedback calibration'].map((x,i)=>`<div class="node"><b>${i+1}. ${x}</b><span>${['Text/voice-style input from travelers.','Priorities, avoidances, budget, dates, features.','Rank cities and neighborhoods dynamically.','Match restaurants, cafés, bars, coworking, sport spots.','Businesses confirm real ambience and evidence.','Opt-in events and social environments, not people scraping.','Visits improve future recommendations.'][i]}</span></div>`).join('')}</div></div><div class="grid3 section"><div class="card flat"><h3>Problem</h3><p>Travel tools optimize price, ratings, or generic attractions. They do not model social fit, ambience, crowd comfort, or group outcome probability.</p></div><div class="card flat"><h3>Solution</h3><p>A structured decision layer where human preferences become ranked city/place/social-route recommendations with transparent scoring.</p></div><div class="card flat"><h3>Prototype status</h3><p>Static frontend only. No backend, no uploads, no real data storage. Built to demonstrate product logic and investor narrative.</p></div></div>`}
function renderIntake(){const s=state.intent;$('intake').innerHTML=`<div class="section"><h2>Traveler Preference Intake</h2><p>Describe the desired social/travel experience. The prototype simulates how voice or text becomes structured intent.</p><div class="split"><div class="card"><h3>Natural language preference</h3><textarea oninput="state.intent.text=this.value">${s.text}</textarea><div class="grid3"><button class="btn" onclick="parseText()">Extract intent</button><button class="ghost" onclick="state.intent.text='Sunny coastal city, fresh seafood, old town, bars, social international crowd, not too expensive';parseText()">Sample coastal</button><button class="ghost" onclick="state.intent.text='Matcha cafes, baked goods, laptop-friendly coworking, young adults, social bars at night';parseText()">Sample remote-work</button></div><h3 style="margin-top:18px">Trip details</h3><div class="grid3"><input type="number" value="${s.groupSize}" min="1" onchange="state.intent.groupSize=+this.value;renderAll()" placeholder="Group size"><input value="${s.ageRange}" onchange="state.intent.ageRange=this.value;renderAll()" placeholder="Age range"><input type="number" value="${s.budget}" onchange="state.intent.budget=+this.value;renderAll()" placeholder="Budget pp"></div><div class="grid3" style="margin-top:10px"><input type="number" value="${s.nights}" onchange="state.intent.nights=+this.value;renderAll()" placeholder="Stay nights"><select onchange="state.intent.month=this.value;renderAll()">${['May','June','July','August','September','October'].map(m=>`<option ${s.month===m?'selected':''}>${m}</option>`).join('')}</select><select onchange="state.intent.style=this.value;renderAll()">${['balanced','social','nightlife','culture','food','budget','remote-work','sports'].map(v=>`<option value="${v}" ${s.style===v?'selected':''}>${v}</option>`).join('')}</select></div><h3 style="margin-top:18px">Avoidance filters</h3>${checkboxGrid('avoid',AVOID,s.avoid)}<h3 style="margin-top:18px">Feature toggles</h3>${checkboxGrid('features',FEATURES,s.features)}</div><div class="card"><h3>Structured intent output</h3><div class="chips">${chips(activeFeatures())}${chips(activeAvoid().map(x=>'avoid: '+x))}</div><pre>${JSON.stringify({group_size:s.groupSize,age_range:s.ageRange,budget_pp:s.budget,stay_length:s.nights,month:s.month,travel_style:s.style,features:activeFeatures(),avoid:activeAvoid(),confidence:{explicit_features:activeFeatures().length,source:'simulated text/voice extraction'}},null,2)}</pre></div></div></div>`}
function rankingBars(items,scoreFn,labelFn,metaFn){return `<div class="bars">${items.map((x,i)=>{const sc=scoreFn(x);return `<div class="bar"><div class="pos">${i+1}</div><div class="name">${labelFn(x)}</div><div class="track"><div class="fill" style="width:${sc}%"></div></div><div class="score">${sc}</div><div class="meta">${metaFn?metaFn(x):''}</div></div>`}).join('')}</div>`}
function renderDestinations(){const sort=$('citySort')?.value||'personal';let arr=[...cities,state.tempCity].filter(Boolean);arr=arr.map(c=>({c,s:cityScore(c)}));arr.sort((a,b)=> sort==='cost'?a.s.cost-b.s.cost:sort==='social'?b.c.social-a.c.social:sort==='nightlife'?b.c.nightlife-a.c.nightlife:sort==='history'?b.c.history-a.c.history:sort==='food'?b.c.food-a.c.food:sort==='comfort'?b.s.season-a.s.season:b.s.score-a.s.score);$('destinations').innerHTML=`<div class="section"><h2>Destination Intelligence</h2><p>Ranking reacts to active intake: budget, month, stay length, travel style, sea access, and avoidance filters.</p><div class="filters"><select id="citySort" onchange="renderDestinations()"><option value="personal">personalized score</option><option value="cost">cost</option><option value="social">social density</option><option value="nightlife">nightlife</option><option value="history">history</option><option value="food">food culture</option><option value="comfort">crowd/season comfort</option></select><input type="number" value="${state.intent.budget}" onchange="state.intent.budget=+this.value;renderAll()" placeholder="Budget cap"><select onchange="state.intent.month=this.value;renderAll()">${['May','June','July','August','September','October'].map(m=>`<option ${state.intent.month===m?'selected':''}>${m}</option>`).join('')}</select><input type="number" value="${state.intent.nights}" onchange="state.intent.nights=+this.value;renderAll()" placeholder="Nights"><select onchange="state.intent.features.sea=this.value==='sea';renderAll()"><option value="any">sea optional</option><option value="sea" ${state.intent.features.sea?'selected':''}>sea required</option></select></div>${rankingBars(arr,x=>x.s.score,x=>x.c.name,x=>'€'+x.s.cost)}<div class="grid3">${arr.slice(0,6).map(({c,s})=>`<div class="card flat ${c.temp?'temp':''}"><h3>${c.name} ${c.temp?'★':''}</h3><p><strong>Score:</strong> ${s.score}/100 · <strong>Est:</strong> €${s.cost} pp</p><p><strong>Best neighborhoods:</strong> ${c.hoods}</p><p>${c.profile}</p><div class="chips">${c.risks.map(r=>`<span class="chip">risk: ${r}</span>`).join('')}</div></div>`).join('')}</div><div class="card section"><h3>Add temporary city</h3><div class="grid4"><input id="tcName" placeholder="City name"><input id="tcCost" type="number" value="750" placeholder="Base cost"><input id="tcSocial" type="number" value="80" placeholder="Social"><input id="tcNight" type="number" value="80" placeholder="Nightlife"></div><div class="grid4" style="margin-top:10px"><input id="tcHistory" type="number" value="80" placeholder="History"><input id="tcFood" type="number" value="80" placeholder="Food"><input id="tcMobility" type="number" value="80" placeholder="Mobility"><select id="tcSea"><option value="true">Sea access</option><option value="false">No sea</option></select></div><div class="grid2" style="margin-top:10px"><input id="tcHoods" placeholder="Best neighborhoods"><input id="tcProfile" placeholder="Why it matches"></div><button class="btn" style="margin-top:10px" onclick="addTempCity()">Add / compare city</button></div></div>`}
function addTempCity(){const n=$('tcName').value.trim();if(!n)return alert('Add a city name');state.tempCity={name:n,type:'custom',baseCost:+$('tcCost').value||750,social:+$('tcSocial').value||80,nightlife:+$('tcNight').value||80,history:+$('tcHistory').value||80,food:+$('tcFood').value||80,mobility:+$('tcMobility').value||80,sea:$('tcSea').value==='true',season:{May:82,June:84,July:82,August:78,September:86,October:82},hoods:$('tcHoods').value||'User-estimated neighborhoods',profile:$('tcProfile').value||'Temporary custom city for comparison',risks:['user-estimated data'],temp:true};renderAll()}
function renderPlaces(){let arr=[...places,state.tempPlace].filter(Boolean).map(p=>({p,s:placeScore(p)})).sort((a,b)=>b.s-a.s);$('places').innerHTML=`<div class="section"><h2>Place Intelligence</h2><p>Dynamic recommendations for restaurants, cafés, bars, coworking spots, sport spots, third spaces, cultural places, and social events.</p>${rankingBars(arr,x=>x.s,x=>x.p.name,x=>x.p.type)}<div class="table"><table><thead><tr><th>Rank</th><th>Place</th><th>Type</th><th>Match</th><th>City / neighborhood</th><th>Why it matches</th><th>Ambience & feature tags</th><th>Price</th><th>Evidence</th><th>Good for</th></tr></thead><tbody>${arr.map((x,i)=>`<tr class="${x.p.temp?'temp':''}"><td><strong>${i+1}</strong></td><td><strong>${x.p.name}</strong></td><td>${x.p.type}</td><td><strong>${x.s}</strong>/100</td><td>${x.p.city} / ${x.p.hood}</td><td>${x.p.why}</td><td>${chips([...x.p.tags,...x.p.amb])}</td><td>${'€'.repeat(x.p.price)}</td><td>${x.p.score.evidence}/100 · ${x.p.biz?'business confirmed':'not confirmed'}</td><td>${x.p.good.join(', ')}</td></tr>`).join('')}</tbody></table></div><div class="card section"><h3>Temporary place simulator</h3><div class="grid4"><input id="tpName" placeholder="Place name"><select id="tpType">${['restaurant','seafood restaurant','café','matcha / specialty drinks','bar','club','sports bar','coworking','third space','beach/sport spot','cultural place','social event'].map(x=>`<option>${x}</option>`).join('')}</select><input id="tpCity" placeholder="City"><input id="tpHood" placeholder="Neighborhood"></div><div class="grid4" style="margin-top:10px"><input id="tpPrice" type="number" value="2" min="1" max="5"><input id="tpSocial" type="number" value="80"><input id="tpEvidence" type="number" value="75"><select id="tpBiz"><option value="true">Business confirmed</option><option value="false">Not confirmed</option></select></div><h3 style="margin-top:14px">Feature tags</h3><div class="checks">${FEATURES.map(f=>`<label><input type="checkbox" class="tpFeature" value="${f}">${f.replaceAll('_',' ')}</label>`).join('')}</div><textarea id="tpWhy" placeholder="Ambience description / notes" style="margin-top:10px"></textarea><button class="btn" style="margin-top:10px" onclick="addTempPlace()">Add temporary place and compare to top 5</button></div></div>`}
function addTempPlace(){const n=$('tpName').value.trim();if(!n)return alert('Add a place name');const tags=q('.tpFeature:checked').map(x=>x.value);state.tempPlace={name:n,type:$('tpType').value,city:$('tpCity').value||'Custom city',hood:$('tpHood').value||'Custom neighborhood',price:+$('tpPrice').value||2,tags:tags.length?tags:['young_adults','international'],amb:['user-estimated'],score:{social:+$('tpSocial').value||80,evidence:+$('tpEvidence').value||75},biz:$('tpBiz').value==='true',good:['groups','meeting people'],why:$('tpWhy').value||'Temporary custom place for comparison',temp:true};renderAll();show('places')}
function renderBusiness(){ $('business').innerHTML=`<div class="section"><h2>Business Portal / Ambience Confirmation UI</h2><p>This is not a generic listing form. It asks businesses to confirm the actual social reality of the place.</p><div class="split"><div class="card"><h3>A. Business identity</h3><div class="grid2"><input id="bizName" placeholder="Name"><input id="bizAddress" placeholder="Address / city / neighborhood"><select id="bizType">${['café','restaurant','bar','coworking','gym','sport spot','hostel','third space'].map(x=>`<option>${x}</option>`).join('')}</select><input id="bizHours" placeholder="Opening hours"><input id="bizWeb" placeholder="Website / Instagram / TikTok"><input id="bizReserve" placeholder="Reservation link"><input id="bizPrice" placeholder="Price range"><input id="bizLang" placeholder="Languages spoken"></div><h3 style="margin-top:18px">B. Ambience profile</h3><div class="checks">${['quiet','social','loud','local','tourist','mixed','young_adults','families','older_crowd','groups','solo_travelers','meeting_people','dates','remote_work','watching_sports','pre_drinks','after_club_food'].map(f=>`<label><input type="checkbox" class="bizAmb" value="${f}">${f.replaceAll('_',' ')}</label>`).join('')}</div><h3 style="margin-top:18px">C. Feature confirmation</h3><div class="checks">${['matcha','specialty_coffee','fresh_seafood','baked_goods','cocktails','natural_wine','sports_tv','live_music','djs','board_games','coworking_tables','sea_view','rooftop','terrace','student_discount','vegetarian','halal','late_night_food'].map(f=>`<label><input type="checkbox" class="bizFeature" value="${f}">${f.replaceAll('_',' ')}</label>`).join('')}</div><h3 style="margin-top:18px">D. Best times</h3><div class="checks">${['quiet_morning','laptop_afternoon','social_evening','party_night','match_day','weekend_peak','recovery_day_friendly'].map(f=>`<label><input type="checkbox" class="bizTime" value="${f}">${f.replaceAll('_',' ')}</label>`).join('')}</div><h3 style="margin-top:18px">E. Proof media</h3><input id="bizImgs" type="file" multiple accept="image/*"><p class="note">Local preview only. No backend upload in this static prototype.</p><div id="bizPreview" class="imageGrid"></div><button class="btn" onclick="genBusinessProfile()">Generate structured profile</button></div><div class="card"><h3>F. Generated structured profile</h3><pre id="bizJson">Fill the form and generate a business-confirmed profile.</pre></div></div></div>`;setTimeout(()=>{$('bizImgs')?.addEventListener('change',e=>preview(e,'bizPreview'))},0)}
function genBusinessProfile(){const profile={name:$('bizName').value,type:$('bizType').value,address:$('bizAddress').value,hours:$('bizHours').value,links:{web:$('bizWeb').value,reservation:$('bizReserve').value},price_range:$('bizPrice').value,languages:$('bizLang').value.split(',').map(x=>x.trim()).filter(Boolean),ambience:q('.bizAmb:checked').map(x=>x.value),features:q('.bizFeature:checked').map(x=>x.value),best_times:q('.bizTime:checked').map(x=>x.value),evidence:{business_confirmed:true,photos_selected:$('bizImgs').files.length,local_preview_only:true},safety:{requires_media_rights:true,faces_blurred_in_production:true,no_private_person_identification:true}};$('bizJson').textContent=JSON.stringify(profile,null,2)}
function preview(e,id){$(id).innerHTML='';[...e.target.files].slice(0,8).forEach(f=>{const img=document.createElement('img');img.src=URL.createObjectURL(f);$(id).appendChild(img)})}
function renderImages(){ $('images').innerHTML=`<div class="section"><h2>Image-Based Place Definer</h2><p>Conceptual image analysis UI. This prototype previews local images and simulates safe venue-level tags. It does not upload or process images.</p><div class="grid2"><div class="card"><input id="imgDef" type="file" multiple accept="image/*"><div id="imgPreview" class="imageGrid" style="margin-top:12px"></div><button class="btn" style="margin-top:12px" onclick="simulateImageTags()">Simulate extracted tags</button><p class="note">Safe wording only: group-friendly, social ambience, high-energy, quiet, laptop-friendly, suitable for young adult groups. No identity, attractiveness, ethnicity, religion, or sensitive trait inference.</p></div><div class="card"><h3>Simulated output</h3><pre id="imgJson">Upload local images and click simulate.</pre></div></div></div>`;setTimeout(()=>{$('imgDef')?.addEventListener('change',e=>preview(e,'imgPreview'))},0)}
function simulateImageTags(){const out={place_type:['cafe','bar','third_space'],ambience:['warm','social','medium-energy'],group_friendliness:.84,laptop_friendliness:.62,sports_tv_visible:false,matcha_visible:true,baked_goods_visible:true,seafood_visible:false,terrace_visible:true,visual_cues:['old-town street','natural light','group seating'],confidence:{ambience:.74,features:.68,terrace:.81},safety:['no face recognition','no private identity inference','no sensitive trait inference']};$('imgJson').textContent=JSON.stringify(out,null,2)}
function renderNetworking(){let arr=events.map(e=>({e,s:featureScore(e.tags)})).sort((a,b)=>b.s-a.s);$('networking').innerHTML=`<div class="section"><h2>Networking / Social Opportunities</h2><p>Best opt-in environments to meet international people. No individual person matching, scraping, or gender targeting.</p>${rankingBars(arr,x=>Math.max(45,x.s),x=>x.e.name,x=>x.e.type)}<div class="grid4">${arr.map(x=>`<div class="card flat"><h3>${x.e.name}</h3><p>Opt-in context. Recommended because it matches: ${x.e.tags.join(', ')}</p></div>`).join('')}</div></div>`}
function renderCosts(){ $('costs').innerHTML=`<div class="section"><h2>Cost Model</h2><p>Founder/investor estimate for operating costs. All values are planning assumptions.</p><div class="grid4"><div class="card"><h3>MAU</h3><input id="mau" type="number" value="1000" oninput="calcCosts()"></div><div class="card"><h3>Voice notes / user</h3><input id="voice" type="number" value="5" oninput="calcCosts()"></div><div class="card"><h3>Image analyses / month</h3><input id="imgs" type="number" value="2000" oninput="calcCosts()"></div><div class="card"><h3>LLM recs / user</h3><input id="llm" type="number" value="10" oninput="calcCosts()"></div><div class="card"><h3>Places in DB</h3><input id="dbplaces" type="number" value="10000" oninput="calcCosts()"></div><div class="card"><h3>Businesses claimed</h3><input id="claims" type="number" value="300" oninput="calcCosts()"></div><div class="card"><h3>MB per image</h3><input id="mb" type="number" value="2" oninput="calcCosts()"></div><div class="card"><h3>API multiplier</h3><input id="mult" type="number" value="1" step="0.1" oninput="calcCosts()"></div></div><div class="card" style="margin-top:14px"><h3>Breakdown</h3><pre id="costJson"></pre><div id="costBars" class="bars"></div><p class="note"><strong>Cost-control rule:</strong> Analyze once → store structured tags → reuse forever.</p></div></div>`;setTimeout(calcCosts,0)}
function calcCosts(){const mau=+$('mau').value||0,voice=+$('voice').value||0,imgs=+$('imgs').value||0,llm=+$('llm').value||0,places=+$('dbplaces').value||0,claims=+$('claims').value||0,mb=+$('mb').value||2,m=+$('mult').value||1;const o={hosting:30,database_storage:20+places*.001+imgs*mb*.0004,voice_transcription:mau*voice*.006*m,image_analysis:imgs*.035*m,llm_reasoning:mau*llm*.01*m,maps_place_api:(mau*.04+claims*.08)*m};o.total=Object.values(o).reduce((a,b)=>a+b,0);$('costJson').textContent=JSON.stringify(Object.fromEntries(Object.entries(o).map(([k,v])=>[k,'€'+v.toFixed(0)])),null,2);const max=Math.max(...Object.values(o));$('costBars').innerHTML=Object.entries(o).filter(x=>x[0]!=='total').map(([k,v],i)=>`<div class="bar"><div class="pos">${i+1}</div><div class="name">${k.replaceAll('_',' ')}</div><div class="track"><div class="fill" style="width:${Math.round(100*v/max)}%"></div></div><div class="score">€${v.toFixed(0)}</div><div></div></div>`).join('')}
function renderSafety(){ $('safety').innerHTML=`<div class="section"><h2>Trust, Safety, and Compliance</h2><div class="grid3"><div class="card"><h3>Prototype boundaries</h3><ul><li>No real data stored in static demo.</li><li>No backend processing yet.</li><li>GitHub Pages is prototype/demo hosting, not production SaaS.</li></ul></div><div class="card"><h3>Privacy principles</h3><ul><li>Do not identify private individuals.</li><li>Do not infer sensitive traits.</li><li>Demographic data is aggregate context only.</li><li>Faces should be blurred in production.</li></ul></div><div class="card"><h3>Business media rules</h3><ul><li>Businesses must own or have consent for uploaded media.</li><li>Images should verify venue features, not people.</li><li>All inferred tags carry confidence.</li></ul></div></div><div class="card section"><h3>Networking boundary</h3><p>Recommend opt-in events and environments only. Do not build “find people nearby,” individual person matching, scraping profiles, gender targeting, or ranking venues by where men/women are.</p></div></div>`}
function renderArchitecture(){ $('architecture').innerHTML=`<div class="section"><h2>Architecture / Product Roadmap</h2><div class="pipeline">${['Voice note','Transcription','Structured preference extraction','City/neighborhood scoring','Place matching','Image + business ambience layer','Itinerary + feedback calibration'].map((x,i)=>`<div class="node"><b>${x}</b><span>${['Text/voice input from users.','Speech-to-text in production.','LLM translates messy desire into schema.','Scoring engine ranks cities and zones.','Database matches verified places.','Image model detects venue features; businesses confirm reality.','Routes and feedback improve future recs.'][i]}</span></div>`).join('')}</div><div class="grid3 section"><div class="card"><h3>System separation</h3><pre>${JSON.stringify({LLM:'preference extraction and explanation',database:'verified place reality',image_model:'venue feature evidence',business_UI:'confirmed ambience',scoring_engine:'decision authority',feedback_loop:'calibration'},null,2)}</pre></div><div class="card"><h3>Roadmap</h3><ol><li>Static investor prototype</li><li>Seed one city with 100–300 places</li><li>Add backend + auth</li><li>Add voice transcription</li><li>Add image upload + safe analysis</li><li>Add business claim portal</li><li>Add feedback calibration</li></ol></div><div class="card"><h3>Scoring logic</h3><pre>city_score = budget fit + seasonality + social density + nightlife + culture/history + food fit + mobility fit

place_score = preference similarity + feature match + social ambience + price fit + business confirmation + evidence confidence + location fit</pre></div></div></div>`}
function renderAll(){renderLanding();renderIntake();renderDestinations();renderPlaces();renderBusiness();renderImages();renderNetworking();renderCosts();renderSafety();renderArchitecture()}
initTabs();parseText();renderAll();
</script>
